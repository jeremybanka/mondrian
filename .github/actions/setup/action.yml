name: Setup
description: Download and install third-party software.
runs:
  using: composite
  steps:
    - name: Install Mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        version: 2026.7.3

    - name: Install Dependencies
      shell: bash
      run: >-
        pnpm install
        --frozen-lockfile
        --filter mondrian-workspace
        --filter mondrian.pdf
